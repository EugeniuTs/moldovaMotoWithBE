# Upstream: Express API server
upstream api_backend {
    server api:4000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req zone=general burst=60 nodelay;
    limit_req_status 429;

    # ── API proxy (/api/* -> Express :4000) ──────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets – long cache ───────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_vary       on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/xml image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;

    # CSP — added api: to connect-src for the booking endpoint
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline' https://unpkg.com;
         style-src   'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: blob:
                     https://*.tile.openstreetmap.org
                     https://*.basemaps.cartocdn.com
                     https://images.unsplash.com
                     https://img.youtube.com;
         connect-src 'self' https://api.brevo.com;
         frame-src   https://www.youtube.com;
         object-src  'none';
         base-uri    'self';
         form-action 'self';"
        always;
}
