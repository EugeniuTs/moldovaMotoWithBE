services:

  # -- API backend (Node.js + SQLite) ------------------------------------
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - api-data:/app/data          # persists DB + uploads
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_PORT=4000
      - API_ADMIN_KEY=${API_ADMIN_KEY:-dev-admin-key-change-in-prod}
      - DATA_DIR=/app/data
      - UPLOADS_DIR=/app/data/uploads
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80,http://localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -- Development frontend (Vite HMR) -----------------------------------
  web-dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_ADMIN_USER=${VITE_ADMIN_USER:-admin}
      - VITE_ADMIN_PASS=${VITE_ADMIN_PASS:-moldova2024}
      - VITE_API_URL=http://localhost:4000/api
      - VITE_API_ADMIN_KEY=${API_ADMIN_KEY:-dev-admin-key-change-in-prod}
      - VITE_UPLOADS_URL=http://localhost:4000
      - VITE_BREVO_API_KEY=${VITE_BREVO_API_KEY:-}
      - VITE_FROM_EMAIL=${VITE_FROM_EMAIL:-}
      - VITE_FROM_NAME=${VITE_FROM_NAME:-MoldovaMoto}
      - VITE_NOTIFY_EMAIL=${VITE_NOTIFY_EMAIL:-}
      - VITE_NOTIFY_WHATSAPP=${VITE_NOTIFY_WHATSAPP:-}
      - VITE_NOTIFY_WHATSAPP_SENDER=${VITE_NOTIFY_WHATSAPP_SENDER:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # -- Production frontend (Nginx) ---------------------------------------
  web-prod:
    build:
      context: .
      target: prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    profiles: ["prod"]
    restart: unless-stopped

volumes:
  api-data:
